version: "3"
services:
  graph-node:
    image: graphprotocol/graph-node
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8020:8020"
      - "8030:8030"
      - "8040:8040"
    depends_on:
      - ipfs
      - postgres
    extra_hosts:
      - host.docker.internal:host-gateway
    environment:
      postgres_host: postgres
      postgres_user: graph-node
      postgres_pass: let-me-in
      postgres_db: graph-node
      ipfs: "ipfs:5001"
      ethereum: "sepolia:https://eth-sepolia.g.alchemy.com/v2/V_PT_aPCXg4HX_Q3msjai"
      ETHEREUM_POLLING_INTERVAL: 2000
      ETHEREUM_BLOCK_BATCH_SIZE: 2
      GRAPH_ETHEREUM_MAX_BLOCK_RANGE_SIZE: 10
      GRAPH_ETHEREUM_TARGET_TRIGGERS_PER_BLOCK_RANGE: 8
      GRAPH_ETHEREUM_MAX_EVENT_ONLY_RANGE: 10
      GRAPH_ETHEREUM_JSON_RPC_TIMEOUT: 60
      GRAPH_ETHEREUM_REQUEST_RETRIES: 20
      GRAPH_STORE_WRITE_BATCH_DURATION: 5
      GRAPH_STORE_WRITE_BATCH_SIZE: 256
      GRAPH_LOG: info
  ipfs:
    image: ipfs/kubo:v0.17.0
    ports:
      - "5001:5001"
    volumes:
      - ./data/ipfs:/data/ipfs
  postgres:
    image: postgres:14
    ports:
      - "5432:5432"
    command:
      [
        "postgres",
        "-cshared_preload_libraries=pg_stat_statements",
        "-cmax_connections=200",
      ]
    environment:
      POSTGRES_USER: graph-node
      POSTGRES_PASSWORD: let-me-in
      POSTGRES_DB: graph-node
      # FIXME: remove this env. var. which we shouldn't need. Introduced by
      # <https://github.com/graphprotocol/graph-node/pull/3511>, maybe as a
      # workaround for https://github.com/docker/for-mac/issues/6270?
      PGDATA: "/var/lib/postgresql/data"
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
