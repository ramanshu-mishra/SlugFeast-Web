specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: SlugDex
    network: sepolia
    source:
      address: "0xD77368f2d018628aE85D73e7759E032b2591C358"
      abi: SlugDex
      startBlock: 10445650
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - OwnershipTransferred
        - TokenBought
        - TokenCreated
        - TokenSold
        - poolcreated
        - tokenDeployed
        - tokenGraduated
      abis:
        - name: SlugDex
          file: ./abis/SlugDex.json
      eventHandlers:
        - event: OwnershipTransferred(indexed address,indexed address)
          handler: handleOwnershipTransferred
        - event: TokenBought(indexed address,uint256,uint256)
          handler: handleTokenBought
        - event: TokenCreated(indexed address,string)
          handler: handleTokenCreated
        - event: TokenSold(indexed address,uint256,uint256)
          handler: handleTokenSold
        - event: poolcreated(indexed address)
          handler: handlepoolcreated
        - event: tokenDeployed(indexed address)
          handler: handletokenDeployed
        - event: tokenGraduated(indexed address)
          handler: handletokenGraduated
      file: ./src/slug-dex.ts
